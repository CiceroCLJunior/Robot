<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Robot</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500&display=swap"
      rel="stylesheet"
    />
    <script>
      document.documentElement.classList.add('js');
    </script>
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <div class="intro-bg">
      <header class="header fadeInDown" data-anime="100">
        <img src="./img/robot.svg" alt="Robot" />
        <nav>
          <ul class="header-menu">
            <li><a href="#projetos">Projetos</a></li>
            <li><a href="#precos">Preços</a></li>
            <li><a href="#contato">Contato</a></li>
          </ul>
        </nav>
      </header>

      <div class="intro-retangulos" aria-hidden="true">
        <svg
          class="retangulos-svg"
          viewBox="0 0 760 420"
          xmlns="http://www.w3.org/2000/svg"
        >
          <defs>
            <symbol id="retangulo-base" viewBox="0 0 282 148">
              <path d="M0 37L282 0V111L0 148V37Z" />
            </symbol>
          </defs>
          <g class="retangulo-entrada entrada-1">
            <use
              href="#retangulo-base"
              class="retangulo r1"
              x="-20"
              y="-10"
              width="380"
              height="190"
            />
          </g>
          <g class="retangulo-entrada entrada-2">
            <g class="retangulo-grupo retangulo-grupo-2">
              <use
                href="#retangulo-base"
                class="retangulo r2"
                x="-25"
                y="129"
                width="380"
                height="178"
              />
            </g>
          </g>
          <g class="retangulo-entrada entrada-3">
            <g class="retangulo-grupo retangulo-grupo-3">
              <use
                href="#retangulo-base"
                class="retangulo r3"
                x="400"
                y="78.5"
                width="340"
                height="174"
              />
            </g>
          </g>
          <g class="retangulo-entrada entrada-4">
            <use
              href="#retangulo-base"
              class="retangulo r4"
              x="235"
              y="230"
              width="340"
              height="178"
            />
          </g>
        </svg>
      </div>

      <section class="intro">
        <div class="intro-texto">
          <h1 class="titulo-destaque fadeInDown" data-anime="400">
            Mais de <span class="marca marca-183">183</span> tipos de
            <span class="marca marca-robos">robôs</span> diferentes para
            automação da <span class="marca marca-sua">sua</span> casa.
          </h1>
        </div>

        <form class="pedido-card fadeInDown" data-anime="600">
          <div class="campo">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="email@dominio.com" />
          </div>

          <div class="pedido-grid">
            <div class="campo">
              <label for="quantidade">Quantidade</label>
              <div class="quantidade-stepper" data-stepper>
                <button
                  class="quantidade-btn"
                  type="button"
                  aria-label="Diminuir quantidade"
                  data-stepper-decrease
                >
                  -
                </button>

                <input
                  type="number"
                  id="quantidade"
                  name="quantidade"
                  value="1"
                  min="1"
                  max="6"
                  inputmode="numeric"
                  data-stepper-input
                />

                <button
                  class="quantidade-btn"
                  type="button"
                  aria-label="Aumentar quantidade"
                  data-stepper-increase
                >
                  +
                </button>
              </div>
            </div>
            <div class="campo">
              <label for="modelo-valor">Modelo</label>

              <div class="modelo-select" data-select>
                <input type="hidden" id="modelo-valor" name="modelo" value="" />

                <button
                  class="modelo-select-btn"
                  type="button"
                  aria-expanded="false"
                  aria-controls="modelo-opcoes"
                  data-select-button
                >
                  <span data-select-label>RT-XT1</span>
                  <span class="modelo-select-icone" aria-hidden="true"></span>
                </button>

                <ul
                  class="modelo-select-lista"
                  id="modelo-opcoes"
                  data-select-list
                >
                  <li>
                    <button type="button" data-value="R2-XT">R2-XT</button>
                  </li>
                  <li>
                    <button type="button" data-value="RT-XT1">RT-XT1</button>
                  </li>
                  <li>
                    <button type="button" data-value="RT-XT3">RT-XT3</button>
                  </li>
                  <li>
                    <button type="button" data-value="SS-TT3">SS-TT3</button>
                  </li>
                  <li>
                    <button type="button" data-value="TT-EE3">TT-EE3</button>
                  </li>
                </ul>
              </div>
            </div>
          </div>
          <button class="btn" type="submit">Fazer pedido</button>
        </form>
      </section>
    </div>

    <section class="modelos">
      <h2 class="fadeInDown" data-anime="800">modelos</h2>

      <ul class="modelos-lista fadeInDown" data-anime="1000">
        <li class="modelo-item">
          <article class="card">
            <a href="#">
              <img src="./img/foto-1.png" alt="Robô RT-XT1" />
              <h3>RT-XT1</h3>
              <p class="preco">R$ 2999</p>
            </a>
          </article>
        </li>

        <li class="modelo-item">
          <article class="card">
            <a href="#">
              <img src="./img/foto-2.png" alt="Robô RT-XT3" />
              <h3>RT-XT3</h3>
              <p class="preco">R$ 1222</p>
            </a>
          </article>
        </li>

        <li class="modelo-item">
          <article class="card">
            <a href="#">
              <img src="./img/foto-3.png" alt="Robô SS-TT3" />
              <h3>SS-TT3</h3>
              <p class="preco">R$ 2212</p>
            </a>
          </article>
        </li>

        <li class="modelo-item">
          <article class="card">
            <a href="#">
              <img src="./img/foto-4.png" alt="Robô RT-XT1" />
              <h3>RT-XT1</h3>
              <p class="preco">R$ 2999</p>
            </a>
          </article>
        </li>

        <li class="modelo-item">
          <article class="card">
            <a href="#">
              <img src="./img/foto-5.png" alt="Robô TT-EE3" />
              <h3>TT-EE3</h3>
              <p class="preco">R$ 5999</p>
            </a>
          </article>
        </li>

        <li class="modelo-item">
          <article class="card">
            <a href="#">
              <img src="./img/foto-6.png" alt="Robô RT-XT1" />
              <h3>RT-XT1</h3>
              <p class="preco">R$ 2999</p>
            </a>
          </article>
        </li>
      </ul>

      <div class="ver-todos fadeInDown" data-anime="1200">
        <a href="#" class="btn">Ver Todos</a>
      </div>
    </section>

    <script src="script.js"></script>
  </body>
</html>
